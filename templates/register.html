<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Akun | Analisis Sentimen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
  </head>
  <body class="register-page">
    <div class="register-wrapper">
      <div class="card p-4 shadow" style="width: 420px; border-radius: 12px;">

        <div class="text-center mb-4">
          <div style="font-size: 2.5rem;">🧾</div>
          <h4 class="fw-bold mt-2">Buat Akun Baru</h4>
          <p class="text-muted small">Daftarkan diri untuk menggunakan sistem</p>
        </div>

        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Nama Lengkap</label>
            <input type="text" name="nama" class="form-control" placeholder="Nama Anda" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" placeholder="email@contoh.com" required />
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="Min. 6 karakter" required minlength="6" />
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Role</label>
            <select name="role" class="form-select">
              <option value="user">User</option>
              <option value="admin">Admin</option>
            </select>
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold">Daftar</button>
        </form>

        <p class="text-center mt-3 mb-0 small">
          Sudah punya akun? <a href="{{ url_for('login') }}">Login</a>
        </p>

      </div>
    </div>

    {% if error_duplicate %}
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
      Swal.fire({
        title: "Gagal Mendaftar!",
        text: "Email atau nama pengguna sudah terdaftar.",
        icon: "error",
        confirmButtonText: "Coba Lagi",
        confirmButtonColor: "#c0392b"
      });
    </script>
    {% endif %}

    {% if success_register %}
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
      Swal.fire({
        title: "Akun Berhasil Dibuat! 🎉",
        text: "Silakan login untuk melanjutkan.",
        icon: "success",
        confirmButtonText: "Login Sekarang",
        confirmButtonColor: "#5c9e5a"
      }).then((result) => {
        if (result.isConfirmed) {
          window.location.href = "{{ url_for('login') }}";
        }
      });
    </script>
    {% endif %}
  </body>
</html>
