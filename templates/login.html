<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Analisis Sentimen</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="{{ url_for('static', filename='css/style.css') }}" rel="stylesheet" />
  </head>
  <body class="login-page">
    <div class="login-wrapper">
      <div class="card p-4 shadow" style="width: 420px; border-radius: 12px;">

        <div class="text-center mb-4">
          <div style="font-size: 2.5rem;">📊</div>
          <h4 class="fw-bold mt-2">Analisis Sentimen</h4>
          <p class="text-muted small">Naive Bayes + TF-IDF</p>
        </div>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} py-2 small">{{ message }}</div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-semibold">Email</label>
            <input type="email" name="email" class="form-control" placeholder="email@contoh.com" required />
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required />
          </div>
          <button type="submit" class="btn btn-primary w-100 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-1"></i> Login
          </button>
        </form>

        <p class="text-center mt-3 mb-0 small">
          Belum punya akun? <a href="{{ url_for('register') }}">Daftar di sini</a>
        </p>

      </div>
    </div>

    {% if success_name %}
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script>
      Swal.fire({
        title: "Selamat datang, {{ success_name }}! 👋",
        text: "Login berhasil.",
        icon: "success",
        confirmButtonText: "Masuk ke Dashboard",
        confirmButtonColor: "#5c9e5a"
      }).then((result) => {
        if (result.isConfirmed) {
          window.location.href = "{{ url_for('dashboard') }}";
        }
      });
    </script>
    {% endif %}

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  </body>
</html>
